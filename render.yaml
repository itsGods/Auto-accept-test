services:
  - type: web
    name: true-request-acceptor
    env: node
    region: oregon
    plan: free
    buildCommand: >
      corepack enable pnpm &&
      pnpm install --frozen-lockfile &&
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/admin-panel run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: sh render-start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: true-request-acceptor-db
          property: connectionString

databases:
  - name: true-request-acceptor-db
    databaseName: truerequestacceptor
    plan: free
