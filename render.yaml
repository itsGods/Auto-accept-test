services:
  - type: web
    name: true-request-acceptor
    env: node
    region: oregon
    plan: free
    buildCommand: sh render-build.sh
    startCommand: sh render-start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: true-request-acceptor-db
          property: connectionString

databases:
  - name: true-request-acceptor-db
    databaseName: truerequestacceptor
    plan: free
